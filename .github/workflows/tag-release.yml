name: Tag release

# Tags each merge to main with the version declared in DexcomKitInfo.version,
# if that tag doesn't exist yet — so cutting a release is just bumping the
# version string in a PR.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    name: Tag if version bumped
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: version
        run: |
          version=$(sed -n 's/.*let version = "\(.*\)".*/\1/p' Sources/DexcomKit/DexcomKit.swift)
          case "$version" in
            [0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "::error::Could not parse a semantic version from DexcomKit.swift (got '$version')"
              exit 1
              ;;
          esac
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Tag if new
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$VERSION" > /dev/null; then
            echo "Tag $VERSION already exists; nothing to do."
            exit 0
          fi
          git tag "$VERSION" "$GITHUB_SHA"
          git push origin "refs/tags/$VERSION"
          echo "Tagged $VERSION at $GITHUB_SHA" >> "$GITHUB_STEP_SUMMARY"
